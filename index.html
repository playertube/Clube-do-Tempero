<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Iframe Full + Banner Flutuante</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* Iframe tela cheia */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Div flutuante */
    .floating-ad {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      animation: pulse 1.5s infinite;
    }

    .floating-ad img {
      width: 250px; /* você pode alterar */
      cursor: pointer;
      border-radius: 10px;
    }

    /* Animação estilo Shopee (chamativa) */
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>

  <!-- IFRAME -->
  <iframe id="meuIframe"></iframe>

  <!-- DIV FLUTUANTE -->
  <div class="floating-ad">
    <a href="https://www.clubedotempero.com/produtos/?ref=JOCEILTONG16" target="_blank">
      <img src="img/produto.png" alt="Anúncio">
    </a>
  </div>

  <script>
    // Pega o parâmetro da URL
    function getParametro(nome) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(nome);
    }

    const url = getParametro("url");

    // Define a URL no iframe
    if (url) {
      document.getElementById("meuIframe").src = decodeURIComponent(url);
    } else {
      document.getElementById("meuIframe").src = "https://google.com";
    }
  </script>

</body>
</html>
